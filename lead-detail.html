<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Detail — BDR Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
:root{
  --ink:#032D42;--ink-nav:#01161f;--ink-mid:#043d5a;
  --wasabi:#63DF4E;--wdk:#4ab83a;
  --white:#fff;--bg:#f1f5f9;
  --s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;
  --s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;
  --s800:#1e293b;--s900:#0f172a;
  --b50:#eff6ff;--b500:#3b82f6;--b600:#2563eb;
  --g50:#f0fdf4;--g100:#dcfce7;--g500:#22c55e;--g600:#16a34a;
  --a50:#fffbeb;--a100:#fef3c7;--a500:#f59e0b;--a600:#d97706;
  --r50:#fff1f2;--r100:#ffe4e6;--r500:#ef4444;--r600:#dc2626;
  --p50:#faf5ff;--p500:#a855f7;--p600:#9333ea;
  --sh-xs:0 1px 2px rgba(0,0,0,.05);
  --sh-sm:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --sh-md:0 4px 12px rgba(0,0,0,.08);
  --r:6px;--rmd:8px;--rlg:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--s800);font-size:13px;line-height:1.5;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--s300);border-radius:2px;}

/* ── TOP NAV ── */
.gnav{height:44px;background:var(--ink-nav);display:flex;align-items:center;position:fixed;top:0;left:0;right:0;z-index:300;border-bottom:1px solid rgba(255,255,255,.06);}
.gnav-logo{display:flex;align-items:center;padding:0 14px;height:44px;border-right:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.gnav-tabs{display:flex;align-items:center;}
.gnav-tab{display:flex;align-items:center;height:44px;padding:0 13px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.gnav-tab:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04);}
.gnav-pill-wrap{flex:1;display:flex;justify-content:center;}
.gnav-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);}
.gnav-pill-dot{width:6px;height:6px;border-radius:50%;background:var(--wasabi);}
.gnav-r{display:flex;align-items:center;gap:2px;padding:0 10px;}
.gnav-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:rgba(255,255,255,.45);font-size:13px;border:none;background:transparent;cursor:pointer;}
.gnav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
.gnav-av{width:28px;height:28px;background:var(--wasabi);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink);cursor:pointer;margin-left:4px;}

/* ── SIDEBAR ── */
.sbar{position:fixed;top:44px;left:0;bottom:0;width:44px;background:#0d1f2b;border-right:1px solid rgba(255,255,255,.05);z-index:200;display:flex;flex-direction:column;overflow:hidden;transition:width .22s cubic-bezier(.4,0,.2,1);}
.sbar:hover{width:180px;box-shadow:4px 0 20px rgba(0,0,0,.25);}
.sbar-sec{padding:10px 0 4px;}
.sbar-lbl{font-size:9px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.20);padding:0 14px;margin-bottom:2px;display:block;white-space:nowrap;opacity:0;transition:opacity .15s .05s;}
.sbar:hover .sbar-lbl{opacity:1;}
.sbar-item{display:flex;align-items:center;gap:10px;padding:8px 14px;font-size:12px;color:rgba(255,255,255,.50);border-left:2px solid transparent;transition:background .12s,color .12s;text-decoration:none;white-space:nowrap;}
.sbar-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85);}
.sbar-item.on{color:var(--wasabi);border-left-color:var(--wasabi);background:rgba(99,223,78,.06);font-weight:500;}
.sbar-ic{width:16px;min-width:16px;text-align:center;font-size:15px;flex-shrink:0;}
.sbar-item.on .sbar-ic::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--wasabi);margin:1px auto 0;}
.sbar:hover .sbar-item.on .sbar-ic::after{display:none;}
.sb{margin-left:auto;font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.40);opacity:0;transition:opacity .1s;flex-shrink:0;}
.sbar:hover .sb{opacity:1;}
.sb.r{background:rgba(239,68,68,.20);color:#fca5a5;}
.sdiv{height:1px;background:rgba(255,255,255,.06);margin:5px 10px;}
.sbar-footer{padding:8px 14px 10px;font-size:9px;color:rgba(255,255,255,.14);margin-top:auto;white-space:nowrap;opacity:0;transition:opacity .15s;}
.sbar:hover .sbar-footer{opacity:1;}

/* ── LAYOUT ── */
.main{margin-top:44px;margin-left:44px;min-height:calc(100vh - 44px);}

/* ── RECORD HEADER ── */
.rec-hdr{background:var(--white);border-bottom:1px solid var(--s200);padding:0 24px;position:sticky;top:44px;z-index:100;}
.rec-hdr-top{display:flex;align-items:center;gap:12px;padding:12px 0 0;}
.breadcrumb{font-size:11px;color:var(--s400);display:flex;align-items:center;gap:5px;flex-shrink:0;}
.breadcrumb a{color:var(--s400);}
.breadcrumb a:hover{color:var(--b600);}
.breadcrumb .sep{color:var(--s300);}
.rec-av{width:38px;height:38px;background:linear-gradient(135deg,var(--ink),var(--ink-mid));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--wasabi);flex-shrink:0;}
.rec-id{font-size:11px;flex:1;min-width:0;}
.rec-name-row{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.rec-name{font-size:18px;font-weight:700;color:var(--s900);letter-spacing:-.02em;}
.rec-badge{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:var(--s100);color:var(--s500);padding:2px 7px;border-radius:3px;border:1px solid var(--s200);}
.rec-mono{font-size:10px;font-family:'DM Mono',monospace;color:var(--s400);}
.rec-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.rec-meta-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--s500);}
.rec-meta-item a{color:var(--b600);}
.rec-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--s300);}
.rec-acts{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:12px;font-weight:500;padding:6px 12px;border-radius:var(--r);cursor:pointer;border:1px solid;transition:.12s;}
.btn-g{background:transparent;color:var(--s600);border-color:var(--s200);}
.btn-g:hover{background:var(--s50);border-color:var(--s300);}
.btn-p{background:var(--ink);color:var(--white);border-color:var(--ink);}
.btn-p:hover{background:var(--ink-mid);}
.btn-w{background:var(--wasabi);color:var(--ink);border-color:var(--wasabi);font-weight:600;}
.btn-w:hover{background:var(--wdk);}
.btn-sm{font-size:11px;padding:5px 11px;}

/* STATUS BAR */
.status-bar{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--s100);margin-top:10px;flex-wrap:wrap;}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid;}
.sp-open{background:var(--b50);color:var(--b600);border-color:var(--b500);}
.sp-working{background:var(--a50);color:var(--a600);border-color:var(--a500);opacity:.5;font-weight:400;}
.sp-qualified{background:var(--g50);color:var(--g600);border-color:var(--g500);opacity:.5;font-weight:400;}
.sp-dq{background:var(--r50);color:var(--r600);border-color:var(--r500);opacity:.5;font-weight:400;}
.sp-dot{width:6px;height:6px;border-radius:50%;}
.owner-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--s600);padding:3px 8px 3px 4px;border-radius:20px;border:1px solid var(--s200);background:var(--s50);}
.owner-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--white);}
.score-chip{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border:1px solid #fde68a;}

/* TAB NAV */
.tab-nav{display:flex;border-top:1px solid var(--s100);margin:0 -24px;padding:0 24px;overflow-x:auto;}
.tab-nav::-webkit-scrollbar{height:0;}
.tab-it{display:flex;align-items:center;gap:5px;padding:9px 13px;font-size:12px;font-weight:500;color:var(--s500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.1s;user-select:none;}
.tab-it:hover{color:var(--s700);}
.tab-it.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600;}
.tab-it.research{color:var(--wdk);background:rgba(99,223,78,.03);}
.tab-it.research.on{color:var(--wdk);border-bottom-color:var(--wasabi);}
.tab-ct{font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;background:var(--s100);color:var(--s500);}
.tab-it.on .tab-ct{background:var(--ink);color:var(--white);}

/* PAGE BODY */
.page-body{display:grid;grid-template-columns:250px 1fr 340px;gap:14px;padding:14px 24px 48px;align-items:start;}

/* PANELS */
.panel{background:var(--white);border:1px solid var(--s200);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh-xs);margin-bottom:12px;}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--s100);}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--s400);}
.panel-act{font-size:11px;color:var(--b600);cursor:pointer;font-weight:500;}
.panel-act:hover{text-decoration:underline;}

/* SCORE RING */
.score-section{padding:14px 15px;border-bottom:1px solid var(--s100);display:flex;align-items:center;gap:13px;}
.score-ring-wrap{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.score-ring-wrap::before{content:'';position:absolute;inset:5px;background:var(--white);border-radius:50%;z-index:1;}
.score-inner{position:relative;z-index:2;text-align:center;}
.score-num{font-size:15px;font-weight:700;color:var(--s800);line-height:1;font-family:'DM Mono',monospace;}
.score-denom{font-size:8px;color:var(--s400);}
.score-details{flex:1;}
.score-lbl{font-size:12px;font-weight:600;color:var(--s700);margin-bottom:1px;}
.score-sub{font-size:10px;color:var(--s400);}
.score-bars{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.sbar-row{display:flex;align-items:center;gap:6px;}
.sbar-lbl2{font-size:10px;color:var(--s400);width:58px;flex-shrink:0;}
.sbar-track{flex:1;height:4px;background:var(--s100);border-radius:2px;overflow:hidden;}
.sbar-fill{height:100%;border-radius:2px;}
.sbar-val{font-size:10px;font-weight:600;color:var(--s500);width:20px;text-align:right;}

/* FIELD GROUPS */
.fg{padding:11px 15px;border-bottom:1px solid var(--s100);}
.fg:last-child{border-bottom:none;}
.fg-lbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--s400);margin-bottom:7px;}
.fr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:3px 0;min-height:24px;}
.fl{font-size:11px;color:var(--s400);flex-shrink:0;min-width:85px;padding-top:1px;}
.fv{font-size:12px;color:var(--s700);font-weight:500;text-align:right;flex:1;line-height:1.4;}
.fv.link{color:var(--b600);cursor:pointer;}
.fv.link:hover{text-decoration:underline;}
.ftag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;}
.ftag-blue{background:var(--b50);color:var(--b600);}
.ftag-green{background:var(--g50);color:var(--g600);}
.ftag-amber{background:var(--a50);color:#92400e;}
.ftag-ink{background:rgba(3,45,66,.07);color:var(--ink);}
.ftag-gray{background:var(--s100);color:var(--s600);}

/* BU STRIP */
.bu-strip{display:flex;flex-wrap:wrap;gap:5px;padding:11px 15px;border-bottom:1px solid var(--s100);}
.bu-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;cursor:pointer;transition:.1s;}
.bu-active{background:rgba(3,45,66,.08);color:var(--ink);border:1px solid rgba(3,45,66,.15);}
.bu-inactive{background:var(--s50);color:var(--s400);border:1px solid var(--s100);}

/* ENGAGEMENT GRID */
.eng-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 15px;}
.eng-stat{background:var(--s50);border-radius:var(--rmd);padding:10px 11px;border:1px solid var(--s100);}
.eng-stat.hl{background:rgba(3,45,66,.04);border-color:rgba(3,45,66,.1);}
.eng-num{font-size:20px;font-weight:700;color:var(--s800);line-height:1;margin-bottom:3px;font-family:'DM Mono',monospace;}
.eng-stat.hl .eng-num{color:var(--ink);}
.eng-lbl{font-size:10px;color:var(--s400);font-weight:500;}

/* AI CARD */
.ai-card{border-radius:var(--rlg);padding:15px 17px;margin-bottom:12px;background:linear-gradient(135deg,#021e2e 0%,var(--ink) 60%,#054060 100%);border:1px solid rgba(99,223,78,.2);position:relative;overflow:hidden;}
.ai-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(99,223,78,.1) 0%,transparent 70%);pointer-events:none;}
.ai-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ai-lbl{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--wasabi);}
.ai-pulse{width:7px;height:7px;background:var(--wasabi);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.85);}}
.ai-card-btns{display:flex;gap:5px;}
.ai-btn{font-size:11px;font-weight:500;padding:3px 10px;border-radius:4px;cursor:pointer;border:1px solid;font-family:inherit;transition:.1s;}
.ai-btn-out{background:transparent;color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15);}
.ai-btn-out:hover{background:rgba(255,255,255,.06);}
.ai-btn-solid{background:var(--wasabi);color:var(--ink);border-color:var(--wasabi);font-weight:600;}
.ai-btn-solid:hover{background:var(--wdk);}
.ai-summary{font-size:12px;color:rgba(255,255,255,.75);line-height:1.65;margin-bottom:12px;}
.ai-summary strong{color:var(--wasabi);font-weight:600;}
.ai-tags{display:flex;flex-wrap:wrap;gap:5px;}
.ai-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;letter-spacing:.03em;}
.ai-tag-green{background:rgba(99,223,78,.12);color:var(--wasabi);border:1px solid rgba(99,223,78,.2);}
.ai-tag-blue{background:rgba(74,179,232,.12);color:#7dd3fc;border:1px solid rgba(74,179,232,.2);}
.ai-tag-amber{background:rgba(245,166,35,.12);color:#fcd34d;border:1px solid rgba(245,166,35,.2);}
.ai-tag-red{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}

/* NBA CARD */
.nba-card{background:var(--white);border:1px solid var(--s200);border-radius:var(--rlg);padding:13px 15px;margin-bottom:12px;box-shadow:var(--sh-xs);}
.nba-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.nba-title{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--s500);}
.nba-items{display:flex;flex-direction:column;gap:6px;}
.nba-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rmd);border:1px solid var(--s100);background:var(--s50);cursor:pointer;transition:.1s;}
.nba-item:hover{border-color:var(--s200);background:var(--white);box-shadow:var(--sh-xs);}
.nba-item.primary{background:var(--ink);border-color:var(--ink);}
.nba-item.primary:hover{background:var(--ink-mid);}
.nba-ic{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.nba-ic-g{background:var(--g50);}
.nba-ic-b{background:var(--b50);}
.nba-ic-a{background:var(--a50);}
.nba-ic-w{background:rgba(255,255,255,.15);}
.nba-text{flex:1;min-width:0;}
.nba-action{font-size:12px;font-weight:600;color:var(--s700);}
.nba-item.primary .nba-action{color:var(--white);}
.nba-sub{font-size:10px;color:var(--s400);}
.nba-item.primary .nba-sub{color:rgba(255,255,255,.5);}
.nba-cta{font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--r);flex-shrink:0;}
.nba-cta-w{background:var(--wasabi);color:var(--ink);}
.nba-cta-g{background:var(--s100);color:var(--s600);}
.nba-cta-wg{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);}

/* TIMELINE */
.tl-panel{background:var(--white);border:1px solid var(--s200);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh-xs);}
.tl-hd{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--s100);}
.tl-title{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--s500);flex:1;}
.tl-filters{display:flex;gap:3px;}
.tlfil{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--s400);font-family:inherit;transition:.1s;}
.tlfil:hover{color:var(--s600);background:var(--s50);}
.tlfil.on{background:var(--s100);color:var(--s700);border-color:var(--s200);}
.tl-compose{margin:11px 15px;display:flex;align-items:center;gap:8px;}
.compose-in{flex:1;height:32px;background:var(--s50);border:1px solid var(--s200);border-radius:var(--rmd);padding:0 12px;font-family:inherit;font-size:12px;color:var(--s600);outline:none;}
.compose-in:focus{border-color:var(--ink);background:var(--white);}
.tl-items{max-height:440px;overflow-y:auto;padding:0 15px 12px;}
.tl-date-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s400);padding:8px 0 4px;display:flex;align-items:center;gap:8px;}
.tl-date-lbl::after{content:'';flex:1;height:1px;background:var(--s100);}
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--s50);cursor:pointer;transition:.1s;}
.tl-item:hover{background:var(--s50);margin:0 -4px;padding:8px 4px;border-radius:var(--r);border-bottom-color:transparent;}
.tl-item:last-child{border-bottom:none;}
.tl-ic{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;}
.tl-email{background:var(--b50);color:var(--b500);}
.tl-call{background:var(--g50);color:var(--g600);}
.tl-li{background:#e0f2fe;color:#0284c7;}
.tl-note{background:var(--a50);color:#b45309;}
.tl-event{background:var(--p50);color:var(--p500);}
.tl-body{flex:1;min-width:0;}
.tl-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.tl-type{font-size:11px;font-weight:600;color:var(--s600);}
.tl-dir{font-size:10px;color:var(--s400);}
.tl-st{font-size:10px;font-weight:500;padding:1px 5px;border-radius:3px;}
.tl-st-closed{background:var(--g50);color:var(--g600);}
.tl-st-open{background:var(--b50);color:var(--b500);}

// ── SHARED PAIN POINT LOGIC ────────────────────────────────────────────────
function getPainPoints(bu, title) {
  const isCLevel = /cio|cto|ciso|ceo|chief|president|evp|chro/i.test(title);
  const buKey = bu.toLowerCase();
  const painMap = {
    itsm: [
      { title: 'Fragmented IT service operations', description: isCLevel ? 'The cost per IT interaction rises when requests move across multiple tools with no single record.' : 'Tickets get routed manually, SLAs get missed, and agents context-switch constantly.', solution: 'ITSM Pro + Now Assist' },
      { title: 'Limited visibility into service performance', description: 'Without unified reporting, it\'s hard to know where the backlog is building or which teams are overloaded.', solution: 'Performance Analytics' },
      { title: 'AI deflection gap', description: 'Repetitive L1 requests consume agent capacity that should go to complex work. Most orgs deflect less than 20% without automation.', solution: 'Now Assist for ITSM' },
    ],
    employee: [
      { title: 'HR inbox overload', description: 'Employees email HR directly for questions the portal should answer — onboarding, benefits, PTO. Your team becomes the support desk.', solution: 'HR Service Delivery' },
      { title: 'Disconnected onboarding experience', description: 'New hire tasks span IT, HR, and Facilities with no single handoff point. Delays in access and equipment hurt time-to-productivity.', solution: 'Onboarding & Transitions' },
      { title: 'No self-service adoption', description: 'Portals exist but employees don\'t use them because they\'re slow or can\'t find answers. Adoption stays low without AI-guided search.', solution: 'Now Assist for HR' },
    ],
    itom: [
      { title: 'Alert noise overwhelming operations teams', description: 'Raw event floods from monitoring tools make it impossible to prioritize. On-call engineers chase noise instead of real incidents.', solution: 'AIOps Event Management' },
      { title: 'Slow mean time to resolution', description: 'Without correlated incident context, engineers start from scratch on every page. MTTR stays high and SLAs get breached.', solution: 'ITOM Health' },
      { title: 'Infrastructure blind spots', description: 'Undiscovered or stale CMDB data means changes happen without visibility into downstream impact.', solution: 'CMDB + Service Mapping' },
    ],
    security: [
      { title: 'Slow incident response across siloed tools', description: 'Detection in the SIEM, investigation in one tool, response in another — analysts spend more time coordinating than resolving.', solution: 'Security Operations' },
      { title: 'Compliance audit gaps', description: 'Manual evidence collection for audits is time-consuming and error-prone. Teams can\'t prove remediation velocity.', solution: 'GRC + Vulnerability Response' },
      { title: 'Identity governance complexity', description: 'Post-acquisition or org change scenarios leave access rights ungoverned. Veza visibility closes that gap.', solution: 'Veza Identity Governance' },
    ],
    asset: [
      { title: 'Unknown license spend', description: 'Most organizations are paying for 15-30% more software than they use. Without discovery, overspend goes undetected until renewal.', solution: 'Software Asset Management' },
      { title: 'Hardware lifecycle blind spots', description: 'End-of-life hardware creates support risk and security exposure when not tracked centrally.', solution: 'Hardware Asset Management' },
      { title: 'Audit readiness gaps', description: 'Reconciling multiple asset lists at audit time is a manual, error-prone process that puts compliance at risk.', solution: 'ITAM' },
    ],
  };
  let key = 'itsm';
  if (buKey.includes('employee') || buKey.includes('hr')) key = 'employee';
  else if (buKey.includes('itom') || buKey.includes('aiops')) key = 'itom';
  else if (buKey.includes('security') || buKey.includes('risk') || buKey.includes('veza')) key = 'security';
  else if (buKey.includes('asset') || buKey.includes('itam') || buKey.includes('ham')) key = 'asset';
  return painMap[key] || painMap.itsm;
}

// ── VALUE PROP MAP ─────────────────────────────────────────────────────────
function getValueProp(bu, title, product) {
  const isCLevel = /cio|cto|ciso|ceo|chief|president|evp|chro/i.test(title);
  const isVP     = /\bvp\b|vice president|svp/i.test(title);

  const buKey = (bu + ' ' + (product||'')).toLowerCase();
  let text = '';

  if (buKey.includes('employee') || buKey.includes('hrsd') || buKey.includes('hr service')) {
    text = isCLevel
      ? 'HR Service Delivery replaces the email chain and the spreadsheet tracker your HR team uses to manage requests. Employees submit onboarding tasks, benefits questions, and policy requests through a single portal — HR handles what needs a human and the rest resolves automatically.'
      : isVP
      ? 'HR Service Delivery gives employees one place to submit any HR request — onboarding, leave, benefits, policy questions — and routes it automatically. Your team stops being the inbox and starts handling the work that actually needs them.'
      : 'HR Service Delivery automates the repeatable HR requests so your team is not answering the same questions every week. Employees get a portal, requests get tracked, and your team gets time back.';
  } else if (buKey.includes('now assist') && (buKey.includes('hr') || buKey.includes('employee'))) {
    text = 'Now Assist for HR adds generative AI on top of HR Service Delivery — employees ask questions in plain language and get instant answers pulled from your actual policies. Cases that used to hit your team never get created.';
  } else if (buKey.includes('now assist') || buKey.includes('aict')) {
    text = isCLevel
      ? 'Now Assist embeds generative AI directly into your existing ServiceNow workflows — it deflects repetitive requests, summarizes open cases for agents, and suggests next actions. No separate AI platform to manage or integrate.'
      : 'Now Assist sits inside the workflows your team already uses. It deflects common requests automatically, writes case summaries, and surfaces next steps — your team gets the same volume done in less time.';
  } else if (buKey.includes('itom') || buKey.includes('aiops')) {
    text = isCLevel
      ? 'IT Operations Management correlates alerts across your entire infrastructure and surfaces what actually needs attention. Your team stops triaging noise and starts resolving real incidents faster — mean time to resolution drops without adding headcount.'
      : 'ITOM takes the raw alert flood from your monitoring tools and correlates it into meaningful incidents. Your on-call team sees the story, not the noise — and has full context to resolve it in one place.';
  } else if (buKey.includes('security') || buKey.includes('veza') || buKey.includes('secops')) {
    text = isCLevel
      ? 'Security Operations connects your SIEM alerts, vulnerability data, and threat intel into automated response playbooks. Incidents that take days to contain get resolved in hours — with a full audit trail attached to every action.'
      : 'SecOps gives your analysts one place to work a case from detection to closure. Playbooks trigger automatically, tools stop requiring manual correlation, and every action is documented without extra effort.';
  } else if (buKey.includes('asset') || buKey.includes('itam') || buKey.includes('ham')) {
    text = isCLevel
      ? 'IT Asset Management gives you a real-time inventory of every hardware and software asset you own — license usage, contract dates, lifecycle status, and cost. Most organizations find immediate savings just from eliminating licenses nobody is using.'
      : 'ITAM tracks every asset from purchase to retirement in the same platform as your service desk. You know exactly what you own, what it costs, and what is coming up for renewal — no more spreadsheet reconciliation at audit time.';
  } else {
    // ITSM default
    text = isCLevel
      ? 'IT Service Management gives your entire service desk one system — incidents, requests, changes, and assets all route, track, and resolve in one place. Most IT leaders use it to cut cost-per-ticket and improve employee experience at the same time.'
      : isVP
      ? 'ITSM replaces the ticket-in-email, update-in-Slack, resolve-in-a-different-tool workflow your team is running today. Everything — request, incident, change, asset — lives in one place and resolves faster.'
      : 'ITSM gives your team one place to handle every IT request. No more routing tickets manually, no more following up across tools. Work comes in, gets assigned, and gets resolved — all tracked in one system.';
  }

  return { text };
}

function getTalkingPoints(l) {
  const first = l.name.split(' ')[0];

  // ── 1. Account status ──────────────────────────────────────────────────
  const OWNED_PRODUCTS = {
    'Sub-Zero Group Inc.': ['ITSM'],
    'Paylocity Corporation': ['ITSM Pro', 'ITOM Visibility'],
    'GATX Corporation': ['ITSM Enterprise', 'ITOM Health', 'CMDB', 'Asset Management'],
    'Crash Champions': ['ITSM Standard'],
    'Eversana': ['ITSM Pro'],
    'Kirkland & Ellis LLP': ['ITSM Pro'],
    'Sargento Foods Inc.': ['ITSM', 'Asset Management'],
  };
  const ownedProds = OWNED_PRODUCTS[l.company] || [];
  const isCustomer = ownedProds.length > 0;

  // ── 2. Active opp in this BU ───────────────────────────────────────────
  const portfolio = PRODUCT_PORTFOLIO[l.company] || [];
  const buKeywords = l.mostRecentBU.toLowerCase().split(/\s+/);
  const productKeywords = l.product.toLowerCase().split(/[\s+]+/);
  const activeOppRow = portfolio.find(row => {
    const rowBu = row.bu.toLowerCase();
    return row.nnacv > 0 && (
      buKeywords.some(k => rowBu.includes(k)) ||
      productKeywords.some(k => k.length > 3 && rowBu.includes(k))
    );
  });
  const hasActiveOpp = !!activeOppRow;
  const activeOppBU  = activeOppRow ? activeOppRow.bu : null;
  const activeOppAmt = activeOppRow ? activeOppRow.nnacv : 0;

  // ── 3. Title seniority ─────────────────────────────────────────────────
  const t = l.title;
  const isCLevel = /cio|cto|ciso|ceo|chief|president|evp/i.test(t);
  const isVP     = /\bvp\b|vice president|svp/i.test(t);
  const isDir    = /director|head of/i.test(t);
  // default = manager / practitioner

  // ── 4. Call opener — proper cold call intro ────────────────────────────
  const triggerLine = {
    'Attended':      `You attended our ${l.campaign} recently and I wanted to reach out while it was still fresh.`,
    'Visited Booth': `We crossed paths at ${l.campaign} and I wanted to follow up — you stopped by the ServiceNow booth.`,
    'Downloaded':    `You pulled down our ${l.campaign} content and I wanted to reach out while it was top of mind.`,
    'Contact Us':    `You submitted a request through our website and I want to make sure you get to the right person.`,
  };
  const trigger = triggerLine[l.memberStatus] || triggerLine['Downloaded'];
  const opener = `Hi ${first}, it's Jacob Rubis calling from ServiceNow — I know I'm catching you out of the blue. ${trigger} Do you have 30 seconds?`;

  // ── 5. Poke the bear — one challenger question to surface latent pain ───
  const buKey = l.mostRecentBU.toLowerCase();
  let pokeBear = '';
  if (buKey.includes('employee') || buKey.includes('hr')) {
    pokeBear = isCustomer
      ? `Most HR teams I talk to tell me their biggest problem isn't headcount — it's that employees just email someone directly because the portal is too slow. Is that showing up at ${l.company}?`
      : `A lot of HR leaders tell me their team spends more time answering the same questions than doing real HR work. Does that sound familiar?`;
  } else if (buKey.includes('itom') || buKey.includes('aiops')) {
    pokeBear = `Most ops teams I talk to aren't drowning in incidents — they're drowning in alert noise that makes it impossible to find the real ones. Is that something your team is dealing with?`;
  } else if (buKey.includes('security') || buKey.includes('risk')) {
    pokeBear = `The CISO-level folks I talk to usually say their team is fast at detecting threats but slow at containing them because the response workflow lives in too many places. Does that track?`;
  } else if (buKey.includes('asset') || buKey.includes('itam')) {
    pokeBear = `Most IT directors I talk to tell me they have no idea how many software licenses they're paying for that nobody uses. Is that a known problem at ${l.company}, or is it more of a blind spot?`;
  } else if (buKey.includes('ai') || buKey.includes('now assist')) {
    pokeBear = isCLevel
      ? `A lot of tech leaders I talk to have an AI mandate from the board but no clear answer on where it actually fits into operations. Is that the conversation you're navigating right now?`
      : `Most teams exploring AI tools end up with something that requires a dedicated workflow to manage. Does that match what you're seeing?`;
  } else {
    // ITSM default
    pokeBear = isCustomer
      ? `The IT teams I talk to who are already on ServiceNow usually tell me the platform covers 80% of what they need — but there's always a pocket of work that still lives in email or spreadsheets. Where is that pocket for your team?`
      : `Most IT leaders I talk to say their service desk is functional but their team spends more time routing tickets than resolving them. Does that sound familiar at ${l.company}?`;
  }


  // ── 6. Three open-ended questions ─────────────────────────────────────
  // Pain-point-specific questions
  const pains = getPainPoints(l.mostRecentBU, l.title);
  const questions = [];

  // Q1: tied to pain point #1, framed as a discovery question
  const p1 = pains[0];
  const p1q = {
    'HR inbox overload':                    `Is HR still the inbox for employee questions at ${l.company} — onboarding, benefits, PTO — or do you have a portal that actually deflects that volume?`,
    'Fragmented IT service operations':     `When a ticket comes in today, how many tools does it touch before it gets resolved? I'm trying to understand where the handoffs are.`,
    'Alert noise overwhelming operations teams': `What does alert volume look like for your ops team right now — are they triaging raw events, or do you have correlation in place?`,
    'Slow incident response across siloed tools': `When a security incident hits, how many tools does your team jump between from detection to closure? I want to understand the workflow.`,
    'Unknown license spend':                `Do you have a clear picture of what software you're actually using versus what you're paying for? Most teams I talk to say that's a blind spot.`,
  }[p1.title] || `When it comes to ${p1.title.toLowerCase()} — is that something you're actively dealing with at ${l.company}? Where does it show up most?`;
  questions.push(p1q);

  // Q2: tied to account context — always pain-point based, never referencing internal deals
  const p2 = pains[1];
  if (isCustomer) {
    questions.push(isCLevel
      ? `Outside of what you're already running with us, where does ${p2.title.toLowerCase()} still show up as a gap for your team?`
      : `You're running ${ownedProds.join(' and ')} with us today — where does ${p2.title.toLowerCase()} still show up as a problem?`);
  } else {
    questions.push(isCLevel
      ? `Is ${p2.title.toLowerCase()} something that's actively on the table, or more of a known issue that hasn't had a home yet?`
      : `When it comes to ${p2.title.toLowerCase()} — where does it break down most often for your team?`);
  }

  // Q3: forward-looking / decision path
  questions.push(isCLevel
    ? `If we found something worth pursuing, who would own the evaluation day-to-day — and is budget already allocated for this area?`
    : isVP
    ? `Is this something you're trying to solve this quarter, or still early exploration? I want to make sure we're using each other's time well.`
    : `Is there someone above you who would need to be part of this conversation, and is there a project it would connect to?`);

  // ── 6. Metrics They Care About ────────────────────────────────────────
  let metricsCaresAbout = [];
  if (isCLevel) {
    const roleMap = {
      cio:  ['Cost per IT interaction / cost per ticket','Employee satisfaction with IT (ESAT/NPS)','Platform ROI and vendor consolidation progress','SLA compliance rate across the org'],
      cto:  ['Engineering velocity and deployment frequency','Tech debt reduction over time','Platform adoption rate across teams','Build vs. buy decision outcomes'],
      ciso: ['Mean time to detect and contain (MTTD / MTTC)','Compliance audit pass rate','Vulnerability remediation SLA adherence','Security program maturity score'],
      chro: ['HR case volume per rep per month','Time-to-resolution for employee requests','Self-service adoption rate','Time-to-productivity for new hires'],
    };
    const roleKey = Object.keys(roleMap).find(k => new RegExp(k,'i').test(l.title)) || 'cio';
    metricsCaresAbout = roleMap[roleKey];
  } else if (isVP) {
    metricsCaresAbout = ['SLA compliance rate and breach volume','First-contact resolution rate','Escalation rate to senior teams','MTTR — mean time to resolve'];
  } else if (isDir) {
    metricsCaresAbout = ['Ticket backlog size and trend','Agent utilization and workload distribution','Automation coverage — % of requests handled without human touch','SLA breach rate by category'];
  } else {
    metricsCaresAbout = ['Volume handled per day per agent','Time spent on manual routing and follow-up','Repeat ticket rate (same issue, different ticket)','Average handle time per request type'];
  }

  const valueProp = getValueProp(l.mostRecentBU, l.title, l.product);
  return { isCustomer, hasActiveOpp, activeOppBU, activeOppAmt, ownedProds, opener, pokeBear, questions, metricsCaresAbout, valueProp };
}

function getTimeline(lead) {
  const tpl = TIMELINE_TEMPLATES[lead.memberStatus] || TIMELINE_TEMPLATES['Downloaded'];
  const now = new Date('2026-04-10');
  const first = lead.name.split(' ')[0];
  return tpl.map(t => {
    const d = new Date(now);
    d.setDate(d.getDate() + t.dt);
    const preview = t.preview.replace('{campaign}', lead.campaign).replace('{product}', lead.product).replace(/{first}/g, first);
    return {...t, date: d, preview};
  }).sort((a,b) => b.date - a.date);
}

function formatDate(d) {
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function slaText(h) {
  if(h===null) return {t:'—', cls:'', col:'var(--s400)'};
  if(h<0) return {t:`OVERDUE ${Math.abs(h)}h`, cls:'', col:'var(--r600)'};
  if(h<=4) return {t:`${h}h remaining`, cls:'', col:'var(--r500)'};
  if(h<=8) return {t:`${h}h remaining`, cls:'', col:'var(--a600)'};
  return {t:`${h}h remaining`, cls:'', col:'var(--g600)'};
}

                  <th style="padding:7px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--s500);text-align:right;white-space:nowrap">NNACV (4RQ)</th>

              <tbody>
                ${portfolio.map(row=>`<tr style="border-bottom:1px solid var(--s100);${row.nnacv>0?'background:rgba(245,158,11,.03);':''}">
                  <td style="padding:8px 10px;font-size:12px;color:var(--s800);font-weight:500"><span style="display:inline-flex;align-items:center;gap:6px">${row.nnacv>0?'<span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;flex-shrink:0"></span>':'<span style="width:6px;height:6px;display:inline-block;flex-shrink:0"></span>'}${row.bu}</span></td>

              </tbody>
            </table>
          </div>
          ${(()=>{
            const activeRows = portfolio.filter(r=>r.nnacv>0);
            if(!activeRows.length) return '';
            const BU_DOT_COLORS = {'ITSM':'#3b82f6','ITOM':'#0e7490','HR Service Delivery':'#7e22ce','Now Assist for ITSM':'#6d28d9','Now Assist for HR':'#7e22ce','Security':'#dc2626','Asset Management':'#0369a1','Legal and Contract Ops':'#92400e','AI Platform Foundations':'#6d28d9'};
            return `<div style="padding:8px 12px;border-top:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.04);display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:10px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.06em">⚡ Active Pipeline:</span>
              ${activeRows.map(r=>`<span style="font-size:11px;font-weight:600;color:#78350f;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);padding:2px 8px;border-radius:4px">${r.bu} · $${r.nnacv}K</span>`).join('')}

      </div>

      <div class="panel">
        <div class="panel-hd"><span class="panel-title">Who Knows Whom</span></div>
        <div style="padding:13px 15px;display:flex;flex-direction:column;gap:8px">
          <div class="wkw-item">
            <div style="width:28px;height:28px;background:${ae.hex};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--white);flex-shrink:0">${l.ae.slice(0,2).toUpperCase()}</div>
            <div><div style="font-size:12px;font-weight:600;color:var(--s700)">${l.ae} (AE)</div><div style="font-size:10px;color:var(--s400)">Account Executive · Account owner</div></div>
            <div style="margin-left:auto"><span class="ftag ftag-green" style="font-size:10px">Primary</span></div>
          </div>
          <div class="wkw-item">
            <div style="width:28px;height:28px;background:var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--wasabi);flex-shrink:0">JR</div>
            <div><div style="font-size:12px;font-weight:600;color:var(--s700)">Jacob Rubis</div><div style="font-size:10px;color:var(--s400)">BDR · Lead owner</div></div>
            <div style="margin-left:auto"><span class="ftag ftag-blue" style="font-size:10px">Active</span></div>
          </div>
        </div>
      </div>

  // ── Event listeners ──────────────────────────────────────────────────────
  document.querySelectorAll('.tlfil').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tlfil').forEach(b => b.classList.remove('on'));
      this.classList.add('on');
    });
  });
  // Store summary HTML for tab switching
  window._summaryHTML = document.getElementById('pageBody').innerHTML;

  document.querySelectorAll('.tab-it').forEach(t => {
    t.addEventListener('click', function() {
      document.querySelectorAll('.tab-it').forEach(x => x.classList.remove('on'));
      this.classList.add('on');
      const label = this.textContent.trim().replace(/\s+\d+$/, '');
      const pb = document.getElementById('pageBody');
      if (label === 'Account Details') {
        pb.style.display = 'block';
        pb.innerHTML = renderAccountDetails(window._currentLead);
      } else if (window._summaryHTML) {
        pb.style.display = '';
        pb.innerHTML = window._summaryHTML;
        // Re-attach timeline filter listeners after re-render
        document.querySelectorAll('.tlfil').forEach(btn => {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.tlfil').forEach(b => b.classList.remove('on'));

          });
        });

  // Pre-call card starts collapsed

// ── CONTACT ASSIST CARD ────────────────────────────────────────────────────
let _cacLoaded = false;

    'ITAM Whitepaper':     'Campaign Asset: Whitepaper — Modernizing IT Asset Management: Hardware, Software & CMDB',
    'Veza Security Brief': 'Campaign Asset: Executive Brief — ServiceNow + Veza: Identity Governance & Zero-Trust Access',
    'Organic Search':      'Inbound: Contact Us Form Submission — servicenow.com organic search',
    'Legal IT Webinar':    'Campaign Asset: Webinar — ITSM for Legal & Professional Services: Matter Management & Service Consolidation',

function toggleCac() {
  const body = document.getElementById('cacBody');
  const icon = document.getElementById('cacToggleIcon');
  if (!body) return;
  const open = body.classList.toggle('open');
  if (icon) icon.textContent = open ? '▲' : '▼';
  if (open && !_cacLoaded) loadCacContent(window._currentLead);
}

function switchCacTab(tab) {
  document.querySelectorAll('.cac-tab').forEach((t,i) => {
    const keys = ['interactions','pain','cases'];
    t.classList.toggle('on', keys[i] === tab);
  });
  document.querySelectorAll('.cac-pane').forEach(p => p.classList.remove('on'));
  const pane = document.getElementById('cac-pane-' + tab);
  if (pane) pane.classList.add('on');
}

function refreshCac() {
  _cacLoaded = false;
  ['interactions','pain','cases'].forEach(k => {
    const pane = document.getElementById('cac-pane-' + k);
    if (pane) pane.innerHTML = `<div class="cac-loading"><div class="skel" style="height:13px;width:70%"></div><div class="skel" style="height:10px;width:90%"></div><div class="skel" style="height:10px;width:80%"></div></div>`;
  });
  const body = document.getElementById('cacBody');
  if (body && body.classList.contains('open')) loadCacContent(window._currentLead);
}

async function loadCacContent(l) {
  if (!l || _cacLoaded) return;

  // Generate content statically from lead data — works in any environment
  const meta = window._cacMeta || {};
  const isCust = meta.isCustomer;
  const owned = (meta.ownedProds || []).join(', ');
  const bu = l.mostRecentBU.toLowerCase();
  const t = l.title;
  const isCLevel = /cio|cto|ciso|ceo|chief|president|evp|chro/i.test(t);
  const isVP = /\bvp\b|vice president|svp/i.test(t);

  // ── Key Interactions ───────────────────────────────────────────────────
  const interactions = [];
  const sourceCtx = {
    'Attended': `${l.name} attended ${l.campaign} live — they carved out time for this session, which signals active interest, not passive browsing.`,
    'Visited Booth': `${l.name} stopped at the ServiceNow booth at ${l.campaign} and initiated the badge scan — they drove the interaction, not us.`,
    'Downloaded': `${l.name} downloaded ${l.campaign} from servicenow.com — someone went looking for this content specifically.`,
    'Contact Us': `${l.name} submitted a Contact Us form — the most direct inbound signal. They asked to be contacted.`,
  };
  interactions.push({
    title: `${l.memberStatus} — ${l.source}`,
    description: sourceCtx[l.memberStatus] || `Engaged via ${l.source} on ${l.campaign}.`
  });
  if (isCust) {
    interactions.push({
      title: 'Existing Customer',
      description: `${l.company} already runs ${owned} with ServiceNow. This is an expansion conversation, not a net-new pitch. Reference the existing relationship early.`
    });
  } else {
    interactions.push({
      title: 'New Logo Opportunity',
      description: `No existing ServiceNow footprint at ${l.company}. Position the platform story first — lead with the business problem, not product names.`
    });
  }
  interactions.push({
    title: `Product Interest: ${l.product}`,
    description: `Campaign engagement maps to ${l.product} — this is the most relevant entry point. Confirm whether this is self-identified or campaign-attributed.`
  });
  if (l.notes) {
    interactions.push({
      title: 'Context Note',
      description: l.notes
    });
  }

  // ── Pain Points ────────────────────────────────────────────────────────
  const painPoints = getPainPoints(l.mostRecentBU, l.title);
  const painKey = (() => { const b = l.mostRecentBU.toLowerCase(); if (b.includes('employee')||b.includes('hr')) return 'employee'; if (b.includes('itom')||b.includes('aiops')) return 'itom'; if (b.includes('security')||b.includes('risk')) return 'security'; if (b.includes('asset')||b.includes('itam')) return 'asset'; return 'itsm'; })();

  // ── Case Studies ──────────────────────────────────────────────────────
  const caseMap = {
    itsm: [
      { title: 'Wiener Linien — 40% reduction in incident resolution time', outcome: 'Unified ITSM across 8,000+ employees on a single platform', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Deloitte — Service desk agent productivity up 25%', outcome: 'Now Assist deflects repetitive L1 requests automatically', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Visa — MTTR reduced from hours to minutes', outcome: 'ITSM Pro + AIOps correlation eliminates alert noise across global ops', url: 'https://www.servicenow.com/customers.html' },
    ],
    employee: [
      { title: 'Uber — 8M+ HR cases handled without agent escalation', outcome: 'HRSD self-service portal replaced email-based HR intake globally', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Wayfair — Onboarding time cut by 50%', outcome: 'Automated cross-department onboarding tasks across IT, HR, and Facilities', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Levi Strauss & Co. — HR case volume down 30%', outcome: 'Now Assist for HR answers policy questions instantly without agent involvement', url: 'https://www.servicenow.com/customers.html' },
    ],
    itom: [
      { title: 'T-Mobile — 90% reduction in alert noise', outcome: 'AIOps correlation eliminates false positives across 50K+ monitored nodes', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Siemens — MTTR reduced by 60%', outcome: 'Service mapping + CMDB gives full blast radius visibility before changes', url: 'https://www.servicenow.com/customers.html' },
      { title: 'BT Group — 40% fewer P1 incidents', outcome: 'Predictive AIOps catches anomalies before they become outages', url: 'https://www.servicenow.com/customers.html' },
    ],
    security: [
      { title: 'Accenture — Incident response 3x faster', outcome: 'Automated SecOps playbooks eliminate manual coordination across tools', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Elsevier — Vulnerability remediation SLA improved 45%', outcome: 'Integrated VR prioritizes and routes findings to the right teams automatically', url: 'https://www.servicenow.com/customers.html' },
      { title: 'DXC Technology — Audit evidence time cut by 70%', outcome: 'GRC automation replaces manual evidence collection for SOC 2 and ISO 27001', url: 'https://www.servicenow.com/customers.html' },
    ],
    asset: [
      { title: 'Bayer — $4M in software savings identified in year one', outcome: 'SAM discovery revealed 30% of licenses were unused or over-provisioned', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Telecom Italia — Full asset lifecycle visibility achieved', outcome: 'HAM tracks 200K+ devices from procurement to retirement in one platform', url: 'https://www.servicenow.com/customers.html' },
      { title: 'Swiss Re — Audit prep time reduced by 60%', outcome: 'Unified ITAM eliminated manual reconciliation across 12 business units', url: 'https://www.servicenow.com/customers.html' },
    ],
  };
  const caseStudies = caseMap[painKey] || caseMap.itsm;

  _cacLoaded = true;
  renderCacContent({ interactions, painPoints, caseStudies });
}

function renderCacContent(data) {
  const iPane = document.getElementById('cac-pane-interactions');
  if (iPane && data.interactions) {
    iPane.innerHTML = data.interactions.map(i => `
      <div class="cac-item">
        <div class="cac-item-title">${i.title}</div>
        <div class="cac-item-desc">${i.description}</div>
      </div>`).join('');
  }
  const pPane = document.getElementById('cac-pane-pain');
  if (pPane && data.painPoints) {
    pPane.innerHTML = data.painPoints.map(p => `
      <div class="cac-item">
        <div class="cac-item-title">${p.title}</div>
        <div class="cac-item-desc">${p.description}</div>
        <span class="cac-sn-solution">SN: ${p.solution}</span>
      </div>`).join('');
  }
  const cPane = document.getElementById('cac-pane-cases');
  if (cPane && data.caseStudies) {
    cPane.innerHTML = data.caseStudies.map(c => `
      <a href="${c.url}" class="cac-link">
        <span style="color:var(--wdk);font-size:12px;flex-shrink:0">📄</span>
        <div>
          <div style="font-weight:600">${c.title}</div>
          <div class="cac-link-outcome">${c.outcome}</div>
        </div>
        <span style="margin-left:auto;font-size:11px;color:var(--s300)">↗</span>
      </a>`).join('');
  }
}

function toggleStatusDrop() {
  const d = document.getElementById('statusDropdown');
  if (d) d.style.display = d.style.display === 'none' ? 'block' : 'none';
}
function setStatus(s) {
  const lbl = document.getElementById('statusLabel');
  if (lbl) lbl.textContent = s;
  const d = document.getElementById('statusDropdown');
  if (d) d.style.display = 'none';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#statusDropdown') && !e.target.closest('[onclick="toggleStatusDrop()"]')) {
    const d = document.getElementById('statusDropdown');
    if (d) d.style.display = 'none';
  }
});

function toggleLeadDetail() {
  const el = document.getElementById('leadDetailExpanded');
  const icon = document.getElementById('leadDetailToggleIcon');
  if (!el || !icon) return;
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  icon.textContent = open ? '▴' : '▾';
}

function togglePct() {
  const body = document.getElementById('pctBody');
  const toggle = document.getElementById('pctToggle');
  if (!body || !toggle) return;
  const isOpen = body.classList.toggle('open');
  toggle.classList.toggle('open', isOpen);
  toggle.textContent = isOpen ? '▲' : '▼';
}

function copyVP(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied'; setTimeout(() => { btn.textContent = '📋 Copy'; }, 1800);
  });
}

function copyQuestion(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    const cp = el.querySelector('.pct-q-copy');
    if (cp) { cp.textContent = '✓'; setTimeout(() => { cp.textContent = '📋'; }, 1500); }
  });
}

function openDraftEmail() {
  const l = window._currentLead;
  if (!l) return;
  const bodies = {
    'Attended':      "Hi " + l.name.split(' ')[0] + ",\n\nReaching out as part of your ServiceNow account team, working alongside your account executive " + l.ae + ".\n\nSaw you attended our " + l.campaign + " — appreciate you making time for that. Most people who check out that session are thinking through how to consolidate IT and HR service delivery into one experience for employees, or dealing with a specific gap in how requests get routed and resolved today.\n\nDid anything from the session connect to something you are working on? Happy to answer questions or go deeper on a specific piece.\n\nBest,\nJacob Rubis\nBusiness Development Representative, ServiceNow",
    'Visited Booth': "Hi " + l.name.split(' ')[0] + ",\n\nReaching out as part of your ServiceNow account team, working alongside your account executive " + l.ae + ".\n\nWe connected briefly at " + l.campaign + " — wanted to follow up while the conversation is still fresh. A lot of the folks I talked to were thinking through how to modernize their service operations without adding headcount.\n\nWould love to pick up where we left off. Is there a specific area that caught your attention, or a problem you are working through right now?\n\nBest,\nJacob Rubis\nBusiness Development Representative, ServiceNow",
    'Downloaded':    "Hi " + l.name.split(' ')[0] + ",\n\nReaching out as part of your ServiceNow account team, working alongside your account executive " + l.ae + ".\n\nNoticed you pulled down our " + l.campaign + " content — usually that means someone is actively thinking through the problem, not just browsing.\n\nMost IT and business leaders explore this area because they are dealing with fragmented service delivery, employees going around the system, or an upcoming initiative that needs a platform behind it. Does any of that resonate with what is going on at " + l.company + "?\n\nBest,\nJacob Rubis\nBusiness Development Representative, ServiceNow",
    'Contact Us':    "Hi " + l.name.split(' ')[0] + ",\n\nReaching out because you submitted a request through our website — wanted to make sure you connected with the right person quickly.\n\nI am on the account team for " + l.company + ", working alongside your account executive " + l.ae + ". Whatever brought you to the form, I can get you to the right answer or set up the right conversation.\n\nWhat prompted the outreach?\n\nBest,\nJacob Rubis\nBusiness Development Representative, ServiceNow",
  };
  const body = bodies[l.memberStatus] || bodies['Downloaded'];
  const subjectMap = {'Attended':'Following up from ' + l.campaign, 'Visited Booth':'Great connecting at ' + l.campaign, 'Contact Us':'Re: Your ServiceNow inquiry', 'Downloaded':'Re: ' + l.campaign};
  const subject = subjectMap[l.memberStatus] || ('Re: ' + l.campaign);

  document.getElementById('email-modal-root').innerHTML =
    '<div class="email-modal" onclick="if(event.target===this)closeEmailModal()">' +
    '<div class="email-card">' +
    '<div class="email-card-hd"><div class="email-card-title">✉ Draft Email — ' + l.name + '</div><button class="email-close" onclick="closeEmailModal()">×</button></div>' +
    '<div class="email-to-bar"><span style="font-size:10px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.06em;width:40px;flex-shrink:0">To</span><span style="font-size:12px;font-weight:600;color:var(--s800)">' + l.name + '</span><span style="font-size:11px;color:var(--s400);margin-left:6px">&lt;' + l.email + '&gt;</span></div>' +
    '<div class="email-to-bar" style="border-top:1px solid var(--s100)"><span style="font-size:10px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.06em;width:40px;flex-shrink:0">Subj</span><input id="email-subject" value="' + subject.replace(/"/g,"'") + '" style="flex:1;border:none;outline:none;font-family:inherit;font-size:12px;color:var(--s800);background:transparent"></div>' +
    '<div class="email-body-wrap"><textarea class="email-body" id="email-body">' + body + '</textarea></div>' +
    '<div class="email-actions"><button class="btn btn-p btn-sm" onclick="copyEmail()">📋 Copy</button><button class="btn btn-p btn-sm" onclick="openInMail()">📨 Open in Mail</button><button class="btn btn-g btn-sm" style="margin-left:auto" onclick="closeEmailModal()">Close</button></div>' +
    '</div></div>';
}

function closeEmailModal() { document.getElementById('email-modal-root').innerHTML = ''; }
function copyEmail() {
  var subj = document.getElementById('email-subject').value;
  var body = document.getElementById('email-body').value;
  navigator.clipboard.writeText('Subject: ' + subj + '\n\n' + body).then(function() {
    var btn = event.target; btn.textContent = '✓ Copied!';
    setTimeout(function(){ btn.textContent = '📋 Copy'; }, 2000);
  });
}
function openInMail() {
  var l = window._currentLead;
  var subj = encodeURIComponent(document.getElementById('email-subject').value);
  var body = encodeURIComponent(document.getElementById('email-body').value);
  window.open('mailto:' + (l ? l.email : '') + '?subject=' + subj + '&body=' + body);
}

renderPage();
